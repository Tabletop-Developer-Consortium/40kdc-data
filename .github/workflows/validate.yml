name: Validate Data

on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd tools && npm ci
      - run: cd tools && npm run build
      - run: cd tools && npm test
      - run: cd tools && npm run validate
